<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      maximum-scale=1 + user-scalable=no disables pinch-zoom and the
      iOS "double-tap to zoom" behavior. This keeps the menu/cart UI
      locked to its designed layout on mobile — important because we
      use sticky headers, a fixed floating cart, and dvh-based heights
      that get visibly broken when the user zooms.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!--
      theme-color = the rollo-paper background, NOT the brand pink. Setting
      it to the hot pink makes iOS Safari's URL bar stay hot pink even
      after the user navigates back from Clover Hosted Checkout, which
      clashes with the soft-pink Sweet Sundae design.

      Three tags pin it for every scenario:
        1. light-mode browsers (most users)
        2. dark-mode browsers (otherwise iOS falls back to a default
           dark URL bar that doesn't match our pink palette)
        3. unscoped fallback for browsers that don't understand the
           media query
    -->
    <meta name="theme-color" content="#FBE4ED" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#FBE4ED" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FBE4ED" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Sweet Sundae type stack:
      - Plus Jakarta Sans (400-800) — body + display
      - Bagel Fat One — brand wordmark only
      - Geist Mono — meta labels, receipt numbers
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Yolo Rollo Ice Cream — Order Online</title>
    <meta
      name="description"
      content="Fresh. Fun. Rolled. Order Yolo Rollo Ice Cream online for in-store pickup at Wolfchase, Memphis."
    />
    <!--
      Clover.js SDK — exposes window.Clover so we can build inline card
      iframes + tokenize Apple Pay / Google Pay payloads. Loaded async to
      not block first paint; src/lib/clover.ts waits for it before use.
      Sandbox uses checkout.sandbox.dev.clover.com; production uses
      checkout.clover.com. We'll point to prod since CLOVER_REGION=us.
    -->
    <script
      src="https://checkout.clover.com/sdk.js"
      async
      data-yolo-clover-sdk
    ></script>
  </head>
  <body class="bg-rollo-paper text-rollo-ink font-body">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
